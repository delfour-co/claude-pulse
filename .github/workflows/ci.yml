name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint-shell:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts ./hooks

  lint-js:
    name: JavaScript syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check JS syntax
        run: |
          node --check extension/extension.js
          node --check extension/prefs.js

  validate-metadata:
    name: Validate metadata.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate metadata
        run: |
          jq . extension/metadata.json > /dev/null
          UUID=$(jq -r '.uuid' extension/metadata.json)
          NAME=$(jq -r '.name' extension/metadata.json)
          VERSIONS=$(jq -r '.["shell-version"] | length' extension/metadata.json)
          SCHEMA=$(jq -r '.["settings-schema"] // empty' extension/metadata.json)
          [ "$UUID" = "claude-pulse@delfour.co" ] || { echo "ERROR: uuid mismatch"; exit 1; }
          [ -n "$NAME" ] || { echo "ERROR: name is empty"; exit 1; }
          [ "$VERSIONS" -gt 0 ] || { echo "ERROR: no shell-version entries"; exit 1; }
          [ "$SCHEMA" = "org.gnome.shell.extensions.claude-pulse" ] || { echo "ERROR: settings-schema mismatch"; exit 1; }
          echo "✓ metadata.json is valid (uuid=$UUID, name=$NAME, versions=$VERSIONS, schema=$SCHEMA)"

  validate-schema:
    name: Validate GSettings schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile schemas
        run: |
          glib-compile-schemas extension/schemas/
          echo "✓ GSettings schema compiles successfully"

  test-hook:
    name: Test hook script
    runs-on: ubuntu-latest
    env:
      XDG_DATA_HOME: /tmp/test-data
    steps:
      - uses: actions/checkout@v4

      - name: Test SessionStart
        run: |
          echo '{"hook_event_name":"SessionStart","session_id":"s1","cwd":"/tmp/p","model":"claude-sonnet-4-6"}' | \
            CLAUDE_PROFILE=ci bash hooks/claude-pulse-hook.sh
          tail -1 /tmp/test-data/claude-pulse/events.jsonl | jq -e '.event == "SessionStart" and .model == "claude-sonnet-4-6"' > /dev/null
          echo "✓ SessionStart"

      - name: Test SubagentStart
        run: |
          echo '{"hook_event_name":"SubagentStart","agent_id":"a1","agent_type":"Explore","session_id":"s1","cwd":"/tmp/p"}' | \
            CLAUDE_PROFILE=ci bash hooks/claude-pulse-hook.sh
          tail -1 /tmp/test-data/claude-pulse/events.jsonl | jq -e '.event == "SubagentStart" and .agent_id == "a1"' > /dev/null
          echo "✓ SubagentStart"

      - name: Test SubagentStop
        run: |
          echo '{"hook_event_name":"SubagentStop","agent_id":"a1","agent_type":"Explore","session_id":"s1","cwd":"/tmp/p","last_assistant_message":"Found 3 files"}' | \
            CLAUDE_PROFILE=ci bash hooks/claude-pulse-hook.sh
          tail -1 /tmp/test-data/claude-pulse/events.jsonl | jq -e '.event == "SubagentStop" and .summary == "Found 3 files"' > /dev/null
          echo "✓ SubagentStop (with summary)"

      - name: Test PreToolUse → ToolUse
        run: |
          echo '{"hook_event_name":"PreToolUse","session_id":"s1","cwd":"/tmp/p","tool_name":"Bash","tool_use_id":"tu1"}' | \
            CLAUDE_PROFILE=ci bash hooks/claude-pulse-hook.sh
          tail -1 /tmp/test-data/claude-pulse/events.jsonl | jq -e '.event == "ToolUse" and .tool_name == "Bash"' > /dev/null
          echo "✓ ToolUse"

      - name: Test PostToolUseFailure → ToolError
        run: |
          echo '{"hook_event_name":"PostToolUseFailure","session_id":"s1","cwd":"/tmp/p","tool_name":"Bash","tool_use_id":"tu2","error":"Permission denied","is_interrupt":false}' | \
            CLAUDE_PROFILE=ci bash hooks/claude-pulse-hook.sh
          tail -1 /tmp/test-data/claude-pulse/events.jsonl | jq -e '.event == "ToolError" and .error == "Permission denied"' > /dev/null
          echo "✓ ToolError"

      - name: Test PreCompact → Compact
        run: |
          echo '{"hook_event_name":"PreCompact","session_id":"s1","cwd":"/tmp/p","trigger":"context_window_full"}' | \
            CLAUDE_PROFILE=ci bash hooks/claude-pulse-hook.sh
          tail -1 /tmp/test-data/claude-pulse/events.jsonl | jq -e '.event == "Compact" and .trigger == "context_window_full"' > /dev/null
          echo "✓ Compact"

      - name: Test TaskCompleted → TaskDone
        run: |
          echo '{"hook_event_name":"TaskCompleted","session_id":"s1","cwd":"/tmp/p","task_id":"t1","task_subject":"Fix bug"}' | \
            CLAUDE_PROFILE=ci bash hooks/claude-pulse-hook.sh
          tail -1 /tmp/test-data/claude-pulse/events.jsonl | jq -e '.event == "TaskDone" and .task_subject == "Fix bug"' > /dev/null
          echo "✓ TaskDone"

      - name: Test WorktreeCreate
        run: |
          echo '{"hook_event_name":"WorktreeCreate","session_id":"s1","cwd":"/tmp/p","name":"wt-001"}' | \
            CLAUDE_PROFILE=ci bash hooks/claude-pulse-hook.sh
          tail -1 /tmp/test-data/claude-pulse/events.jsonl | jq -e '.event == "WorktreeCreate" and .name == "wt-001"' > /dev/null
          echo "✓ WorktreeCreate"

      - name: Test WorktreeRemove
        run: |
          echo '{"hook_event_name":"WorktreeRemove","session_id":"s1","cwd":"/tmp/p","worktree_path":"/tmp/p/.claude/worktrees/wt-001"}' | \
            CLAUDE_PROFILE=ci bash hooks/claude-pulse-hook.sh
          tail -1 /tmp/test-data/claude-pulse/events.jsonl | jq -e '.event == "WorktreeRemove"' > /dev/null
          echo "✓ WorktreeRemove"

      - name: Test UserPromptSubmit → Prompt
        run: |
          echo '{"hook_event_name":"UserPromptSubmit","session_id":"s1","cwd":"/tmp/p","prompt":"fix the bug"}' | \
            CLAUDE_PROFILE=ci bash hooks/claude-pulse-hook.sh
          tail -1 /tmp/test-data/claude-pulse/events.jsonl | jq -e '.event == "Prompt"' > /dev/null
          echo "✓ Prompt (no content stored)"

      - name: Test Notification
        run: |
          echo '{"hook_event_name":"Notification","session_id":"s1","cwd":"/tmp/p","message":"Waiting for input","title":"Claude","notification_type":"info"}' | \
            CLAUDE_PROFILE=ci bash hooks/claude-pulse-hook.sh
          tail -1 /tmp/test-data/claude-pulse/events.jsonl | jq -e '.event == "Notification" and .message == "Waiting for input"' > /dev/null
          echo "✓ Notification"

      - name: Test Stop
        run: |
          echo '{"hook_event_name":"Stop","session_id":"s1","cwd":"/tmp/p"}' | \
            CLAUDE_PROFILE=ci bash hooks/claude-pulse-hook.sh
          tail -1 /tmp/test-data/claude-pulse/events.jsonl | jq -e '.event == "Stop"' > /dev/null
          echo "✓ Stop"

      - name: Test SessionEnd
        run: |
          echo '{"hook_event_name":"SessionEnd","session_id":"s1","cwd":"/tmp/p","reason":"user_exit"}' | \
            CLAUDE_PROFILE=ci bash hooks/claude-pulse-hook.sh
          tail -1 /tmp/test-data/claude-pulse/events.jsonl | jq -e '.event == "SessionEnd" and .reason == "user_exit"' > /dev/null
          echo "✓ SessionEnd"

      - name: Test git branch in SessionStart
        run: |
          git init /tmp/test-repo
          git -C /tmp/test-repo checkout -b feat/test
          git -C /tmp/test-repo config user.email "ci@test" && git -C /tmp/test-repo config user.name "CI"
          touch /tmp/test-repo/.gitkeep && git -C /tmp/test-repo add . && git -C /tmp/test-repo commit -m "init"
          echo '{"hook_event_name":"SessionStart","session_id":"s2","cwd":"/tmp/test-repo","model":"claude-sonnet-4-6"}' | \
            CLAUDE_PROFILE=ci XDG_DATA_HOME=/tmp/test-data bash $GITHUB_WORKSPACE/hooks/claude-pulse-hook.sh
          tail -1 /tmp/test-data/claude-pulse/events.jsonl | jq -e '.branch == "feat/test"' > /dev/null
          echo "✓ Git branch captured"

      - name: Test compute-cost script
        run: |
          mkdir -p /tmp/test-transcript
          echo '{"type":"assistant","message":{"model":"claude-sonnet-4-6","usage":{"input_tokens":100,"cache_creation_input_tokens":500,"cache_read_input_tokens":10000,"output_tokens":200}}}' > /tmp/test-transcript/session.jsonl
          RESULT=$(bash hooks/compute-cost.sh /tmp/test-transcript/session.jsonl "claude-sonnet-4-6")
          echo "$RESULT" | jq -e '.cost_usd > 0' > /dev/null
          echo "$RESULT" | jq -e '.tokens > 0' > /dev/null
          echo "✓ compute-cost.sh works"

      - name: Test compute-cost incremental mode matches full parse
        run: |
          mkdir -p /tmp/cost-inc
          TR=/tmp/cost-inc/session.jsonl
          ST=/tmp/cost-inc/state.json
          rm -f "$TR" "$ST"
          echo '{"type":"assistant","message":{"model":"claude-sonnet-4-6","usage":{"input_tokens":100,"cache_creation_input_tokens":500,"cache_read_input_tokens":10000,"output_tokens":200}}}' > "$TR"
          bash hooks/compute-cost.sh "$TR" "claude-sonnet-4-6" "$ST" > /dev/null
          echo '{"type":"assistant","message":{"model":"claude-sonnet-4-6","usage":{"input_tokens":50,"cache_creation_input_tokens":200,"cache_read_input_tokens":5000,"output_tokens":100}}}' >> "$TR"
          INC=$(bash hooks/compute-cost.sh "$TR" "claude-sonnet-4-6" "$ST" | jq -c '{cost_usd,tokens,input,output,cache_read,cache_create}')
          FULL=$(bash hooks/compute-cost.sh "$TR" "claude-sonnet-4-6" | jq -c '{cost_usd,tokens,input,output,cache_read,cache_create}')
          [ "$INC" = "$FULL" ] || { echo "ERROR: incremental=$INC full=$FULL"; exit 1; }
          echo "✓ incremental compute-cost matches authoritative"

      - name: Test compute-cost handles partial trailing line
        run: |
          mkdir -p /tmp/cost-partial
          TR=/tmp/cost-partial/session.jsonl
          ST=/tmp/cost-partial/state.json
          rm -f "$TR" "$ST"
          echo '{"type":"assistant","message":{"model":"claude-sonnet-4-6","usage":{"input_tokens":100,"cache_creation_input_tokens":0,"cache_read_input_tokens":0,"output_tokens":200}}}' > "$TR"
          printf '%s' '{"type":"assistant","message":{"model":"claude-sonnet-4-6","usage":{"input_tok' >> "$TR"
          bash hooks/compute-cost.sh "$TR" "claude-sonnet-4-6" "$ST" | jq -e '.input == 100 and .output == 200' > /dev/null
          echo "✓ partial trailing line ignored"

      - name: Test PostToolUse no-op without opt-in
        run: |
          mkdir -p /tmp/cost-live/data/claude-pulse
          rm -f /tmp/cost-live/data/claude-pulse/events.jsonl
          TR=/tmp/cost-live/t.jsonl
          echo '{"type":"assistant","message":{"model":"claude-sonnet-4-6","usage":{"input_tokens":100,"cache_creation_input_tokens":0,"cache_read_input_tokens":0,"output_tokens":200}}}' > "$TR"
          echo "{\"hook_event_name\":\"PostToolUse\",\"session_id\":\"sLive\",\"cwd\":\"/tmp\",\"transcript_path\":\"$TR\",\"model\":\"claude-sonnet-4-6\",\"tool_name\":\"Read\",\"tool_use_id\":\"tu1\"}" | \
            XDG_DATA_HOME=/tmp/cost-live/data CLAUDE_PROFILE=ci bash hooks/claude-pulse-hook.sh
          [ ! -s /tmp/cost-live/data/claude-pulse/events.jsonl ] || { echo "ERROR: PostToolUse emitted without opt-in"; cat /tmp/cost-live/data/claude-pulse/events.jsonl; exit 1; }
          echo "✓ PostToolUse no-op when CLAUDE_PULSE_LIVE_COST unset"

      - name: Test PostToolUse emits live Cost with opt-in
        run: |
          TR=/tmp/cost-live/t.jsonl
          rm -f /tmp/cost-live/data/claude-pulse/events.jsonl /tmp/cost-live/cost-state-sLive.json
          echo "{\"hook_event_name\":\"PostToolUse\",\"session_id\":\"sLive\",\"cwd\":\"/tmp\",\"transcript_path\":\"$TR\",\"model\":\"claude-sonnet-4-6\",\"tool_name\":\"Read\",\"tool_use_id\":\"tu1\"}" | \
            XDG_DATA_HOME=/tmp/cost-live/data CLAUDE_PULSE_LIVE_COST=1 CLAUDE_PROFILE=ci bash hooks/claude-pulse-hook.sh
          tail -1 /tmp/cost-live/data/claude-pulse/events.jsonl | jq -e '.event == "Cost" and .final == false and .cost_usd > 0' > /dev/null
          [ -f "/tmp/cost-live/cost-state-sLive.json" ] || { echo "ERROR: state file not written"; exit 1; }
          echo "✓ PostToolUse emits Cost (final:false) with opt-in"

      - name: Test Stop emits authoritative Cost with final:true
        run: |
          TR=/tmp/cost-live/t.jsonl
          rm -f /tmp/cost-live/data/claude-pulse/events.jsonl
          echo "{\"hook_event_name\":\"Stop\",\"session_id\":\"sLive\",\"cwd\":\"/tmp\",\"transcript_path\":\"$TR\",\"model\":\"claude-sonnet-4-6\"}" | \
            XDG_DATA_HOME=/tmp/cost-live/data CLAUDE_PROFILE=ci bash hooks/claude-pulse-hook.sh
          tail -1 /tmp/cost-live/data/claude-pulse/events.jsonl | jq -e '.event == "Cost" and .final == true' > /dev/null
          EMITTED=$(tail -1 /tmp/cost-live/data/claude-pulse/events.jsonl | jq -c '{cost_usd,tokens,input,output,cache_read,cache_create}')
          FULL=$(bash hooks/compute-cost.sh "$TR" "claude-sonnet-4-6" | jq -c '{cost_usd,tokens,input,output,cache_read,cache_create}')
          [ "$EMITTED" = "$FULL" ] || { echo "ERROR: emitted=$EMITTED full=$FULL"; exit 1; }
          echo "✓ Stop Cost (final:true) matches authoritative compute-cost.sh output"

      - name: Verify total event count
        run: |
          COUNT=$(wc -l < /tmp/test-data/claude-pulse/events.jsonl)
          [ "$COUNT" -eq 14 ] || { echo "ERROR: expected 14 events, got $COUNT"; exit 1; }
          echo "✓ All 14 events captured correctly"

  # --- Release: GNOME zip + RPM + DEB + AUR ---
  release:
    name: Package & Release
    runs-on: ubuntu-latest
    needs: [lint-shell, lint-js, validate-metadata, validate-schema, test-hook]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev jq dpkg-dev debhelper lftp

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
          echo "✓ GPG key imported"

      - name: Compile schemas
        run: glib-compile-schemas extension/schemas/

      # --- GNOME Extension zip ---
      - name: Build extension zip
        run: |
          cd extension
          zip -r ../claude-pulse@delfour.co.zip \
            extension.js prefs.js metadata.json stylesheet.css icons/ schemas/

      # --- RPM spec + source tarball (for Fedora COPR) ---
      - name: Build RPM source tarball
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          git archive --format=tar.gz --prefix=claude-pulse-${VERSION}/ HEAD \
            -o claude-pulse-${VERSION}.tar.gz
          cp packaging/fedora/claude-pulse.spec claude-pulse.spec
          sed -i "s/^Version:.*/Version:        ${VERSION}/" claude-pulse.spec
          echo "✓ RPM source tarball + spec ready"

      # --- DEB (Ubuntu/Debian) ---
      - name: Build DEB package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG=gnome-shell-extension-claude-pulse
          BUILD_DIR="${PKG}-${VERSION}"
          mkdir -p "$BUILD_DIR"
          cp -r extension hooks scripts LICENSE README.md CHANGELOG.md "$BUILD_DIR/"
          cp -r packaging/ubuntu/debian "$BUILD_DIR/"
          sed -i "s/1.0.0-1/${VERSION}-1/" "$BUILD_DIR/debian/changelog"
          chmod +x "$BUILD_DIR/debian/rules"
          cd "$BUILD_DIR"
          dpkg-buildpackage -us -uc -b --no-check-builddeps 2>&1 || echo "⚠ DEB build had warnings"
          cd ..
          mv *.deb . 2>/dev/null || true
          ls *.deb 2>/dev/null && echo "✓ DEB package built" || echo "⚠ DEB not produced"

      # --- AUR PKGBUILD ---
      - name: Prepare AUR PKGBUILD
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cp packaging/arch/PKGBUILD .
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          # Compute sha256
          TARBALL_URL="https://github.com/delfour-co/claude-pulse/archive/v${VERSION}/claude-pulse-${VERSION}.tar.gz"
          SHA=$(curl -sL "$TARBALL_URL" | sha256sum | cut -d' ' -f1)
          sed -i "s/sha256sums=('SKIP')/sha256sums=('${SHA}')/" PKGBUILD
          echo "✓ PKGBUILD prepared (sha256=${SHA})"

      # --- Release with all artifacts ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-pulse@delfour.co.zip
            claude-pulse-*.tar.gz
            claude-pulse.spec
            *.deb
            PKGBUILD
          generate_release_notes: true
          body: |
            ## Install

            **From source (all distros):**
            ```bash
            git clone https://github.com/delfour-co/claude-pulse.git
            cd claude-pulse && bash scripts/install.sh
            ```

            **GNOME Extension zip:**
            ```bash
            gnome-extensions install --force claude-pulse@delfour.co.zip
            ```

            **Fedora (COPR):**
            ```bash
            sudo dnf copr enable delfour-co/claude-pulse
            sudo dnf install gnome-shell-extension-claude-pulse
            ```

            **Arch (AUR):**
            ```bash
            yay -S gnome-shell-extension-claude-pulse
            ```

            **Ubuntu/Debian:**
            ```bash
            sudo dpkg -i gnome-shell-extension-claude-pulse_*.deb
            ```

            Then log out and back in (Wayland) or press Alt+F2 → r (X11).
            Run `bash scripts/install.sh` to configure Claude Code hooks.

      # --- Upload to Ubuntu PPA ---
      - name: Build and upload PPA source package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG=gnome-shell-extension-claude-pulse

          # Prepare source tree
          mkdir -p ppa-build
          git archive --format=tar.gz --prefix=${PKG}-${VERSION}/ HEAD \
            -o ppa-build/${PKG}_${VERSION}.orig.tar.gz
          cd ppa-build
          tar xzf ${PKG}_${VERSION}.orig.tar.gz
          cp -r ${PKG}-${VERSION}/packaging/ubuntu/debian ${PKG}-${VERSION}/

          # Update changelog with version and distribution
          cat > ${PKG}-${VERSION}/debian/changelog << CHLOG
          ${PKG} (${VERSION}-1~ppa1) noble; urgency=medium

            * Release ${VERSION}

           -- Kevin Delfour <contact@delfour.co>  $(date -R)
          CHLOG
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' ${PKG}-${VERSION}/debian/changelog

          # Build source package
          cd ${PKG}-${VERSION}
          dpkg-source -b .
          cd ..

          # Sign .dsc
          gpg --batch --local-user ${{ secrets.GPG_KEY_ID }} --clearsign ${PKG}_${VERSION}-1~ppa1.dsc
          mv ${PKG}_${VERSION}-1~ppa1.dsc.asc ${PKG}_${VERSION}-1~ppa1.dsc

          # Create .changes
          cat > ${PKG}_${VERSION}-1~ppa1_source.changes.unsigned << CHANGES
          Format: 1.8
          Date: $(date -R)
          Source: ${PKG}
          Binary: ${PKG}
          Architecture: source
          Version: ${VERSION}-1~ppa1
          Distribution: noble
          Urgency: medium
          Maintainer: Kevin Delfour <contact@delfour.co>
          Changed-By: Kevin Delfour <contact@delfour.co>
          Description:
           ${PKG} - Real-time Claude Code agent monitoring for GNOME Shell
          Changes:
           ${PKG} (${VERSION}-1~ppa1) noble; urgency=medium
           .
             * Release ${VERSION}
          Checksums-Sha1:
           $(sha1sum ${PKG}_${VERSION}.orig.tar.gz | awk '{print $1}') $(stat -c%s ${PKG}_${VERSION}.orig.tar.gz) ${PKG}_${VERSION}.orig.tar.gz
           $(sha1sum ${PKG}_${VERSION}-1~ppa1.diff.gz | awk '{print $1}') $(stat -c%s ${PKG}_${VERSION}-1~ppa1.diff.gz) ${PKG}_${VERSION}-1~ppa1.diff.gz
           $(sha1sum ${PKG}_${VERSION}-1~ppa1.dsc | awk '{print $1}') $(stat -c%s ${PKG}_${VERSION}-1~ppa1.dsc) ${PKG}_${VERSION}-1~ppa1.dsc
          Checksums-Sha256:
           $(sha256sum ${PKG}_${VERSION}.orig.tar.gz | awk '{print $1}') $(stat -c%s ${PKG}_${VERSION}.orig.tar.gz) ${PKG}_${VERSION}.orig.tar.gz
           $(sha256sum ${PKG}_${VERSION}-1~ppa1.diff.gz | awk '{print $1}') $(stat -c%s ${PKG}_${VERSION}-1~ppa1.diff.gz) ${PKG}_${VERSION}-1~ppa1.diff.gz
           $(sha256sum ${PKG}_${VERSION}-1~ppa1.dsc | awk '{print $1}') $(stat -c%s ${PKG}_${VERSION}-1~ppa1.dsc) ${PKG}_${VERSION}-1~ppa1.dsc
          Files:
           $(md5sum ${PKG}_${VERSION}.orig.tar.gz | awk '{print $1}') $(stat -c%s ${PKG}_${VERSION}.orig.tar.gz) devel optional ${PKG}_${VERSION}.orig.tar.gz
           $(md5sum ${PKG}_${VERSION}-1~ppa1.diff.gz | awk '{print $1}') $(stat -c%s ${PKG}_${VERSION}-1~ppa1.diff.gz) devel optional ${PKG}_${VERSION}-1~ppa1.diff.gz
           $(md5sum ${PKG}_${VERSION}-1~ppa1.dsc | awk '{print $1}') $(stat -c%s ${PKG}_${VERSION}-1~ppa1.dsc) devel optional ${PKG}_${VERSION}-1~ppa1.dsc
          CHANGES
          sed -i 's/^          //' ${PKG}_${VERSION}-1~ppa1_source.changes.unsigned

          # Sign .changes
          gpg --batch --local-user ${{ secrets.GPG_KEY_ID }} --clearsign ${PKG}_${VERSION}-1~ppa1_source.changes.unsigned
          mv ${PKG}_${VERSION}-1~ppa1_source.changes.unsigned.asc ${PKG}_${VERSION}-1~ppa1_source.changes

          # Upload via lftp (single session)
          lftp -c "
          open ftp://anonymous:@ppa.launchpad.net/~delfour-co/claude-pulse/ubuntu
          put ${PKG}_${VERSION}.orig.tar.gz
          put ${PKG}_${VERSION}-1~ppa1.diff.gz
          put ${PKG}_${VERSION}-1~ppa1.dsc
          put ${PKG}_${VERSION}-1~ppa1_source.changes
          "
          echo "✓ PPA upload complete"

      # --- Update AUR ---
      - name: Update AUR package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG=gnome-shell-extension-claude-pulse

          # Setup SSH for AUR
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          echo -e "Host aur.archlinux.org\n  IdentityFile ~/.ssh/aur\n  User aur\n  StrictHostKeyChecking no" > ~/.ssh/config

          # Clone AUR repo
          git clone ssh://aur@aur.archlinux.org/${PKG}.git aur-pkg
          cd aur-pkg

          # Update PKGBUILD
          cp ../PKGBUILD .
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD

          # Generate .SRCINFO
          TARBALL_URL="https://github.com/delfour-co/claude-pulse/archive/v${VERSION}/claude-pulse-${VERSION}.tar.gz"
          SHA=$(curl -sL "$TARBALL_URL" | sha256sum | cut -d' ' -f1)
          sed -i "s/sha256sums=('SKIP')/sha256sums=('${SHA}')/" PKGBUILD

          cat > .SRCINFO << SRCEOF
          pkgbase = ${PKG}
          	pkgdesc = Real-time Claude Code agent monitoring for GNOME Shell
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://github.com/delfour-co/claude-pulse
          	arch = any
          	license = MIT
          	makedepends = glib2
          	depends = gnome-shell>=45
          	depends = jq
          	source = ${PKG}-${VERSION}.tar.gz::${TARBALL_URL}
          	sha256sums = ${SHA}

          pkgname = ${PKG}
          SRCEOF
          sed -i 's/^          //' .SRCINFO

          # Commit and push
          git config user.email "contact@delfour.co"
          git config user.name "Claude Pulse CI"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || {
            git commit -m "Update to v${VERSION}"
            git push
            echo "✓ AUR updated to v${VERSION}"
          }
