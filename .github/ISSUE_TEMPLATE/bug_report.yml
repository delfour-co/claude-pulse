name: Bug Report
description: Report a bug with Claude Pulse
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below.

  - type: input
    id: gnome-version
    attributes:
      label: GNOME Shell version
      description: "Run `gnome-shell --version` to find out"
      placeholder: "GNOME Shell 49.4"
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: Linux distribution
      placeholder: "Fedora 43, Ubuntu 24.10, etc."
    validations:
      required: true

  - type: dropdown
    id: session-type
    attributes:
      label: Session type
      options:
        - Wayland
        - X11
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: "Run `journalctl /usr/bin/gnome-shell -b | grep -i claude` and paste the output"
      render: shell
